<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login | Holicare</title>

<link rel="stylesheet"
href="../css/login.css">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Poppins:wght@300;400;500&display=swap"
rel="stylesheet">

</head>

<body>

<div class="page">

<div class="left-section">

<div class="logo">

✚ Holicare

</div>

<h1>

Your Smile <br>

Starts Here

</h1>

<p>

Access appointments, connect with specialists,
and experience personalized dental care.

</p>

</div>
<div class="popup-overlay" id="popup">
    <div class="popup-content">
        <h4 class="popup-heading">Kindly enter your email address</h4>

        <input
            type="email"
            id="email"
            placeholder="Enter your email address"
        >

        <div class="buttons">
            <button id="submitBtn">Submit</button>
            <button id="closeBtn">Cancel</button>
        </div>
    </div>
</div>


<div class="login-card">

<h2>

Welcome Back

</h2>

<p>

Sign in to continue

</p>

<form id="loginForm">

<input
type="email"
placeholder="Email"
required
>

<input
type="password"
placeholder="Password"
required
>
<!-- 

<select id="role">

<option value="guest">

Continue as Guest

</option>

<option value="client">

Client

</option>

<option value="dentist">

Dentist

</option>

</select> -->


<button>

Continue

</button>

</form>

<div class="footer-text">

Don't remember your password?
<a href="#" id="ForgotPasswordLink">

Forgot Password</a>



</div>

</div>

</div>

<script src="../js/login.js"></script>

</body>

</html>
